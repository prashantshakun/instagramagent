name: Instagram Auto-Reply Bot

on:
  schedule:
    # Runs at the top of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual triggering with optional inputs to add new rules
    inputs:
      post_url:
        description: 'Instagram Post or Reel URL'
        required: false
      keyword:
        description: 'Trigger keyword (case-insensitive)'
        required: false
      reply_text:
        description: 'Reply text to post publicly'
        required: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to rebase and push properly

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🤖 Run agent.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          INPUT_POST_URL: ${{ github.event.inputs.post_url }}
          INPUT_KEYWORD: ${{ github.event.inputs.keyword }}
          INPUT_REPLY: ${{ github.event.inputs.reply_text }}
        run: python agent.py

      - name: 💾 Commit and Push changes
        run: |
          # Configure Git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the JSON files (ignoring errors if they don't exist yet)
          git add rules.json processed_comments.json || true
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "💤 No changes to state files. Skipping commit."
          else
            echo "📝 Committing updated state files..."
            git commit -m "chore: update bot state [skip ci]"
            
            # Pull with rebase to prevent race conditions if other commits happened
            git pull --rebase origin main
            
            # Push changes back to the repository
            git push
          fi
